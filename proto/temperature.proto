syntax = "proto3";

package temperature;

service TemperatureService {
  rpc GetLatest(GetLatestRequest) returns (TemperatureAverage);
  rpc GetHistory(GetHistoryRequest) returns (stream TemperatureAverage);
}

message GetLatestRequest {}

message GetHistoryRequest {
  int64 start_timestamp = 1;
  int64 end_timestamp = 2;
}

message TemperatureAverage {
  float average_celsius = 1;
  int64 timestamp = 2;
  int32 sample_count = 3;
}
